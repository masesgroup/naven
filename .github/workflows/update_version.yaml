# This is a basic workflow to help you get started with Actions

name: "Change version"

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  workflow_dispatch:
    inputs:
      CurrentVersion:
        description: 'The current version'
        required: true
        type: string
      PreReleaseCurrentVersion:
        description: 'The current version pre-release tag'
        required: false
        type: string
      NewVersion:
        description: 'The new version'
        required: true
        type: string
      PreReleaseNewVersion:
        description: 'The new version pre-release tag'
        required: false
        type: string
        
# This workflow contains one job called "build_documentation"
jobs:
  update_version:
    # The type of runner that the job will run on
    runs-on: windows-2022

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:   
      # Runs a set of commands using the runners shell
      # Support longpaths
      - name: Support long paths
        run: git config --system core.longpaths true
      
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          fetch-depth: '1'

      - run: (Get-Content ${{ github.workspace }}\src\jvm\naven\pom.xml).Replace('<navenversion>${{ inputs.CurrentVersion }}.0</navenversion>', '<navenversion>${{ inputs.NewVersion }}.0</navenversion>') | Set-Content ${{ github.workspace }}\src\jvm\naven\pom.xml
      
      - run: (Get-Content ${{ github.workspace }}\src\net\Common\Common.props).Replace('<Version>${{ inputs.CurrentVersion }}.0${{ inputs.PreReleaseCurrentVersion }}</Version>', '<Version>${{ inputs.NewVersion }}.0${{ inputs.PreReleaseNewVersion }}</Version>') | Set-Content ${{ github.workspace }}\src\net\Common\Common.props

      - run: (Get-Content ${{ github.workspace }}\src\net\NavenCLI\NavenCLI.nuspec).Replace('<version>${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }}</version>', '<version>${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}</version>') | Set-Content ${{ github.workspace }}\src\net\NavenCLI\NavenCLI.nuspec

      - run: (Get-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPS.psd1).Replace('${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }}', '${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}') | Set-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPS.psd1
      - run: (Get-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPSCore.psd1).Replace('${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }}', '${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}') | Set-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPSCore.psd1
      - run: (Get-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPSFramework.psd1).Replace('${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }}', '${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}') | Set-Content ${{ github.workspace }}\src\net\NavenPS\MASES.NavenPSFramework.psd1

      - run: (Get-Content ${{ github.workspace }}\src\net\templates\templates\navenApp\navenApp.csproj).Replace('${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }}', '${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}') | Set-Content ${{ github.workspace }}\src\net\templates\templates\navenApp\navenApp.csproj
      
      - name: Request a PR to commit changes
        uses: peter-evans/create-pull-request@v8
        with:
          branch-suffix: short-commit-hash
          add-paths: src/*.*
          commit-message: Update version from ${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }} to ${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}
          title: Update version from ${{ inputs.CurrentVersion }}${{ inputs.PreReleaseCurrentVersion }} to ${{ inputs.NewVersion }}${{ inputs.PreReleaseNewVersion }}
          body: |
            Automated changes by GitHub action fix #6
          reviewers: masesdevelopers
          assignees: masesdevelopers
          labels: enhancement, Docker, java, Naven, Naven CLI, Naven PowerShell, Naven Template, .NET 